<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Quiz Interactivo MRU</title>

  <meta http-equiv="X-Frame-Options" content="ALLOWALL">
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">

  <meta property="og:title" content="Quiz Interactivo MRU">
  <meta property="og:description" content="Pon a prueba tus conocimientos sobre Movimiento Rectilíneo Uniforme">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/201/201623.png">
  <meta property="og:url" content="https://TU-LINK.netlify.app">

  <meta name="twitter:card" content="summary_large_image">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#0f4c81,#1d9bf0);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .quiz-container{
      background:white;
      width:100%;
      max-width:750px;
      border-radius:20px;
      padding:30px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .header{
      text-align:center;
      margin-bottom:20px;
    }

    .header h1{
      color:#0f4c81;
      margin-bottom:10px;
    }

    .graphic{
      font-size:3rem;
      margin-bottom:10px;
    }

    .progress-container{
      width:100%;
      height:12px;
      background:#ddd;
      border-radius:20px;
      overflow:hidden;
      margin-bottom:25px;
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(to right,#1d9bf0,#2ecc71);
      transition:0.3s;
    }

    .question-text{
      font-size:1.3rem;
      margin-bottom:20px;
      color:#222;
    }

    .options{
      display:grid;
      gap:15px;
    }

    .option-btn{
      background:#f3f7fb;
      border:none;
      padding:15px;
      border-radius:12px;
      cursor:pointer;
      transition:0.2s;
      font-size:1rem;
      text-align:left;
    }

    .option-btn:hover{
      background:#dff1ff;
    }

    .correct{
      background:#d4f8d4 !important;
    }

    .incorrect{
      background:#ffd6d6 !important;
    }

    .next-btn{
      margin-top:20px;
      width:100%;
      padding:14px;
      border:none;
      background:#0f4c81;
      color:white;
      border-radius:12px;
      cursor:pointer;
      display:none;
    }

    .result-box{
      display:none;
      text-align:center;
    }

    .score{
      font-size:3rem;
      color:#27ae60;
      margin:20px 0;
    }
  </style>
</head>

<body>

<div class="quiz-container">

  <div class="header">
    <div class="graphic">🚗📏⏱️</div>
    <h1>Quiz Interactivo MRU</h1>
    <p>Pon a prueba tus conocimientos</p>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="quiz-box">
    <h2 class="question-text" id="question"></h2>
    <div class="options" id="options"></div>
    <button class="next-btn" id="nextBtn">Siguiente</button>
  </div>

  <div class="result-box" id="resultBox">
    <h2>¡Quiz Finalizado!</h2>
    <div class="score" id="score"></div>
    <p id="message"></p>
  </div>

</div>

<script>
const questionBank = [
{
question:"¿Qué significa MRU?",
options:["Movimiento Rectilíneo Uniforme","Movimiento Rápido Universal","Movimiento Recto Unido","Movimiento Repetitivo Uniforme"],
answer:0
},
{
question:"En el MRU la velocidad es:",
options:["Variable","Constante","Nula","Acelerada"],
answer:1
},
{
question:"¿Qué trayectoria sigue un objeto en MRU?",
options:["Curva","Circular","Recta","Zigzag"],
answer:2
},
{
question:"¿Cuál es la fórmula de velocidad?",
options:["v=d/t","F=m.a","P=m.g","E=m.c²"],
answer:0
},
{
question:"¿Qué magnitud representa la letra t?",
options:["Tiempo","Trabajo","Trayectoria","Temperatura"],
answer:0
},
{
question:"En MRU no existe aceleración.",
options:["Verdadero","Falso"],
answer:0
},
{
question:"¿Qué instrumento mide el tiempo?",
options:["Regla","Cronómetro","Balanza","Termómetro"],
answer:1
},
{
question:"Si la velocidad es constante, el movimiento es:",
options:["MRU","MRUA","Circular","Parabólico"],
answer:0
},
{
question:"¿Qué unidad se usa para velocidad?",
options:["m/s","kg","N","J"],
answer:0
},
{
question:"¿Qué ejemplo representa MRU?",
options:["Auto acelerando","Tren constante en línea recta","Pelota cayendo","Bicicleta frenando"],
answer:1
}
];

let selectedQuestions = [];
let currentQuestion = 0;
let score = 0;

const question = document.getElementById("question");
const options = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const progressBar = document.getElementById("progressBar");

function shuffle(array){
  return array.sort(()=>Math.random()-0.5);
}

function startQuiz(){
  selectedQuestions = shuffle([...questionBank]).slice(0,5);
  currentQuestion = 0;
  score = 0;
  loadQuestion();
}

function loadQuestion(){
  nextBtn.style.display="none";

  const q = selectedQuestions[currentQuestion];

  question.innerText = q.question;

  progressBar.style.width = ((currentQuestion)/5)*100 + "%";

  options.innerHTML="";

  q.options.forEach((option,index)=>{
    const button = document.createElement("button");
    button.classList.add("option-btn");
    button.innerText = option;

    button.addEventListener("click",()=>selectAnswer(button,index));

    options.appendChild(button);
  });
}

function selectAnswer(button,index){
  const q = selectedQuestions[currentQuestion];
  const buttons = document.querySelectorAll(".option-btn");

  buttons.forEach(btn=>btn.disabled=true);

  if(index===q.answer){
    button.classList.add("correct");
    score++;
  }else{
    button.classList.add("incorrect");
    buttons[q.answer].classList.add("correct");
  }

  nextBtn.style.display="block";
}

nextBtn.addEventListener("click",()=>{
  currentQuestion++;

  if(currentQuestion<5){
    loadQuestion();
  }else{
    showResults();
  }
});

function showResults(){
  document.getElementById("quiz-box").style.display="none";
  document.getElementById("resultBox").style.display="block";

  progressBar.style.width="100%";

  document.getElementById("score").innerText = score + "/5";

  const message = document.getElementById("message");

  if(score===5){
    message.innerText = "¡Excelente trabajo!";
  }else if(score>=3){
    message.innerText = "¡Muy bien!";
  }else{
    message.innerText = "Sigue practicando.";
  }
}

startQuiz();
</script>

</body>
</html>
