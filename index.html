
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz MRU Refinado</title>

<style>
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f4c81,#1d9bf0);
padding:20px;
margin:0;
}

.container{
background:white;
max-width:950px;
margin:auto;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#0f4c81;
}

.subtitle{
text-align:center;
margin-bottom:20px;
}

.levels{
display:flex;
gap:10px;
margin-bottom:20px;
}

.level{
flex:1;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:bold;
background:#ddd;
}

.active.easy{background:#2ecc71;color:white;}
.active.medium{background:#f39c12;color:white;}
.active.hard{background:#e74c3c;color:white;}

.progress{
height:14px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(to right,#3498db,#2ecc71);
transition:0.3s;
}

.question{
font-size:24px;
margin-bottom:20px;
line-height:1.4;
}

.options{
display:grid;
gap:12px;
}

.option{
padding:15px;
border:none;
border-radius:10px;
background:#f3f7fb;
cursor:pointer;
font-size:16px;
text-align:left;
transition:0.2s;
}

.option:hover{
background:#dff1ff;
}

.correct{background:#b8f5b8 !important;}
.incorrect{background:#ffbaba !important;}

.feedback{
margin-top:15px;
padding:15px;
border-radius:10px;
background:#fff3cd;
display:none;
}

#nextBtn,#restartBtn{
margin-top:20px;
padding:15px;
width:100%;
border:none;
border-radius:10px;
background:#0f4c81;
color:white;
font-size:18px;
cursor:pointer;
}

#nextBtn{display:none;}

#result{
display:none;
}

.card{
background:#f1f1f1;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.score{
font-size:4rem;
text-align:center;
color:#27ae60;
}

@media(max-width:700px){
.levels{
flex-direction:column;
}
}
</style>
</head>

<body>

<div class="container">

<h1>🚗 Quiz Interactivo MRU</h1>
<p class="subtitle">Demuestra cuánto sabes sobre Movimiento Rectilíneo Uniforme</p>

<div class="levels">
<div class="level easy" id="easy">🟢 Fácil</div>
<div class="level medium" id="medium">🟠 Intermedio</div>
<div class="level hard" id="hard">🔴 Difícil</div>
</div>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<div id="quiz">

<div class="question" id="question"></div>

<div class="options" id="options"></div>

<div class="feedback" id="feedback"></div>

<button id="nextBtn">Siguiente Pregunta</button>

</div>

<div id="result">

<h2 style="text-align:center;">🏆 Quiz Finalizado</h2>

<div class="score" id="score"></div>

<p id="message" style="text-align:center;"></p>

<div id="review"></div>

<button id="restartBtn" onclick="restartQuiz()">
🔄 Intentar nuevamente
</button>

</div>

</div>

<script>

const easyQuestions=[

{
q:"¿Qué significa MRU?",
o:["Movimiento Rectilíneo Uniforme","Movimiento Rápido Universal","Movimiento Recto Unido","Movimiento Repetitivo Uniforme"],
a:0,
e:"MRU significa Movimiento Rectilíneo Uniforme."
},

{
q:"¿Cómo es la velocidad en el MRU?",
o:["Variable","Constante","Acelerada","Infinita"],
a:1,
e:"En el MRU la velocidad permanece constante."
},

{
q:"¿Qué trayectoria sigue un objeto en MRU?",
o:["Curva","Circular","Recta","Parabólica"],
a:2,
e:"El MRU ocurre en línea recta."
},

{
q:"¿Qué magnitudes intervienen en el MRU?",
o:["Masa y fuerza","Distancia, tiempo y velocidad","Peso y volumen","Fuerza y energía"],
a:1,
e:"En MRU se relacionan distancia, tiempo y velocidad."
},

{
q:"¿Qué instrumento mide el tiempo?",
o:["Regla","Cronómetro","Balanza","Dinamómetro"],
a:1,
e:"El cronómetro mide el tiempo."
},

{
q:"¿Qué representa la letra d en MRU?",
o:["Densidad","Distancia","Dirección","Duración"],
a:1,
e:"La letra d representa distancia."
},

{
q:"¿Qué unidad representa velocidad?",
o:["kg","m/s","N","J"],
a:1,
e:"La velocidad se mide normalmente en metros por segundo."
}

];

const mediumQuestions=[

{
q:"¿Qué ocurre con la aceleración en MRU?",
o:["Aumenta","Disminuye","Es cero","Es infinita"],
a:2,
e:"En MRU la aceleración es cero porque la velocidad no cambia."
},

{
q:"¿Cuál es la fórmula de velocidad en MRU?",
o:["v=d/t","F=m.a","P=m.g","d=v+t"],
a:0,
e:"La velocidad se calcula dividiendo distancia para tiempo."
},

{
q:"Si un auto recorre 100 m en 10 s, ¿su velocidad es?",
o:["5 m/s","10 m/s","15 m/s","20 m/s"],
a:1,
e:"100 ÷ 10 = 10 m/s."
},

{
q:"¿Qué gráfica representa mejor un MRU?",
o:["Línea recta","Curva","Parábola","Zigzag"],
a:0,
e:"La gráfica distancia-tiempo del MRU es una línea recta."
},

{
q:"¿Qué sucede si la velocidad permanece constante?",
o:["Existe MRU","Hay aceleración","El objeto está quieto","El movimiento desaparece"],
a:0,
e:"Si la velocidad es constante, el movimiento es MRU."
},

{
q:"¿Qué significa que un móvil recorra distancias iguales en tiempos iguales?",
o:["Que acelera","Que tiene MRU","Que se detiene","Que cambia de dirección"],
a:1,
e:"Eso significa que mantiene velocidad constante."
},

{
q:"¿Qué característica distingue principalmente al MRU?",
o:["Trayectoria curva","Velocidad constante","Aceleración variable","Movimiento circular"],
a:1,
e:"La principal característica del MRU es la velocidad constante."
}

];

const hardQuestions=[

{
q:"72 km/h equivalen aproximadamente a:",
o:["18 m/s","20 m/s","22 m/s","25 m/s"],
a:1,
e:"Para convertir km/h a m/s se divide entre 3.6."
},

{
q:"¿Qué representa la pendiente en una gráfica distancia-tiempo de MRU?",
o:["La masa","La velocidad","La aceleración","La fuerza"],
a:1,
e:"La pendiente representa la velocidad."
},

{
q:"¿Qué ocurre si un móvil mantiene velocidad constante durante todo el recorrido?",
o:["Tiene MRU","Tiene aceleración","Está detenido","Tiene movimiento circular"],
a:0,
e:"La velocidad constante es la condición principal del MRU."
},

{
q:"¿Cuál de estos ejemplos representa un MRU?",
o:["Un auto acelerando","Un tren en línea recta a velocidad constante","Una pelota cayendo","Un carro frenando"],
a:1,
e:"El MRU necesita trayectoria recta y velocidad constante."
},

{
q:"¿Qué ocurre con la distancia recorrida en MRU conforme pasa el tiempo?",
o:["Aumenta proporcionalmente","Disminuye","Se vuelve cero","Permanece fija"],
a:0,
e:"En MRU la distancia aumenta proporcionalmente al tiempo."
},

{
q:"¿Por qué el MRU no tiene aceleración?",
o:["Porque no cambia la velocidad","Porque el objeto está quieto","Porque no hay tiempo","Porque no existe distancia"],
a:0,
e:"La aceleración mide cambios de velocidad. Si la velocidad no cambia, la aceleración es cero."
},

{
q:"Si dos móviles tienen la misma velocidad constante, ambos presentan:",
o:["MRU","Aceleración","Movimiento circular","Caída libre"],
a:0,
e:"La velocidad constante es característica del MRU."
}

];

function shuffle(a){
return a.sort(()=>Math.random()-0.5);
}

let questions=[];
let current=0;
let score=0;
let wrong=[];

function startQuiz(){

questions=[
...shuffle([...easyQuestions]).slice(0,2),
...shuffle([...mediumQuestions]).slice(0,2),
...shuffle([...hardQuestions]).slice(0,2)
];

current=0;
score=0;
wrong=[];

document.getElementById("quiz").style.display="block";
document.getElementById("result").style.display="none";

loadQuestion();
}

function updateLevels(){

easy.className="level easy";
medium.className="level medium";
hard.className="level hard";

if(current<=1){
easy.classList.add("active");
}else if(current<=3){
medium.classList.add("active");
}else{
hard.classList.add("active");
}

}

function loadQuestion(){

updateLevels();

feedback.style.display="none";
nextBtn.style.display="none";

const q=questions[current];

question.innerText=q.q;

bar.style.width=((current)/6)*100+"%";

options.innerHTML="";

q.o.forEach((opt,i)=>{

const btn=document.createElement("button");

btn.className="option";

btn.innerText=opt;

btn.onclick=()=>answer(btn,i);

options.appendChild(btn);

});

}

function answer(btn,i){

const q=questions[current];

const buttons=document.querySelectorAll(".option");

buttons.forEach(b=>b.disabled=true);

if(i===q.a){

btn.classList.add("correct");
score++;

feedback.innerHTML="✅ ¡Correcto!";
feedback.style.display="block";

}else{

btn.classList.add("incorrect");
buttons[q.a].classList.add("correct");

feedback.innerHTML=`
❌ Incorrecto.<br><br>
✅ Respuesta correcta:
<strong>${q.o[q.a]}</strong><br><br>
📘 ${q.e}
`;

feedback.style.display="block";

wrong.push({
q:q.q,
c:q.o[q.a],
e:q.e
});

}

nextBtn.style.display="block";

}

nextBtn.onclick=()=>{

current++;

if(current<6){
loadQuestion();
}else{
finishQuiz();
}

};

function finishQuiz(){

quiz.style.display="none";
result.style.display="block";

score.innerText=window.score + "/6";

if(window.score>=5){
message.innerText="🏆 Excelente dominio del MRU";
}else if(window.score>=3){
message.innerText="👏 Buen trabajo";
}else{
message.innerText="📚 Sigue practicando";
}

review.innerHTML="<h3>📘 Retroalimentación Final</h3>";

if(wrong.length===0){

review.innerHTML += "<div class='card'>🎉 No tuviste errores.</div>";

}else{

wrong.forEach(w=>{

review.innerHTML += `
<div class="card">
<strong>❌ ${w.q}</strong><br><br>
✅ Respuesta correcta:
<strong>${w.c}</strong><br><br>
📖 ${w.e}
</div>
`;

});

}

}

function restartQuiz(){
startQuiz();
}

startQuiz();

</script>

</body>
</html>
